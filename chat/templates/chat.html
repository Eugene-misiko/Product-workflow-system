{% extends 'base.html' %}
{% block content %}
<h2>Chat - Order #{{ order.id }}</h2>
<div style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;">
    {% for message in messages %}
        <p>
            <strong>{{ message.sender.username }}:</strong>
            {{ message.content }}
            <br>
            <small>{{ message.timestamp }}</small>
        </p>
        <hr>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}
</div>

<br>

<form method="POST">
    {% csrf_token %}
    <textarea name="content" rows="3" cols="60" placeholder="Type your message..." required></textarea>
    <br><br>
    <button type="submit">Send</button>
</form>

<br>
<a href="{% url 'order_detail' order.id %}">Back to Order</a>
{% endblock content %}

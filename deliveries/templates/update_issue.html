{% extends "base.html" %}

{% block content %}
<h2>Update Issue for Order #{{ issue.delivery.order.id }}</h2>

<form method="POST">
    {% csrf_token %}

    <select name="status">
        {% for value, label in issue.STATUS_CHOICES %}
            <option value="{{ value }}"
                {% if issue.status == value %}selected{% endif %}>
                {{ label }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
</form>
{% endblock %}

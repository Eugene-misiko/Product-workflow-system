{% extends "base.html" %}

{% block content %}
<h2>Update Delivery Status</h2>

<form method="POST">
    {% csrf_token %}

    <select name="status">
        {% for value, label in delivery.STATUS_CHOICES %}
            <option value="{{ value }}" {% if delivery.status == value %}selected{% endif %}>
                {{ label }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
</form>
{% endblock %}

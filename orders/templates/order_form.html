{% extends "base.html" %}
{% load static %}
{% block content %}    
<div class="bg-white m-3 p-10 shadow-md rounded-md text-center ml-10 mr-10">
<fieldset>
<legend class="font-bold text-black">Create Category</legend>
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Submit</button>
    </form>
    <br>
    <a href="">Back to Category List</a>
</fieldset>

   <h2>Create New Product</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Product</button>
    </form>


{% endblock %}
</div>

{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center w-full bg-gray-100">
    <div class="bg-white p-8 rounded-lg max-w-md w-full shadow-lg">
        <h2 class="">Create Order</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}          {% for field in form %}
                <div class="space-y-2">
               <label for="{{ field.id_for_label }}" class="">
                     {{ field.label }}
              </label>
                    {{ field}}
                {{field.total_price}}
                    {% if field.errors %}
                 {% for error in field.errors %}
                     <p class="mt-2 text-sm text-red-600">{{ error }}</p>
                    {% endfor %}
             {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-400 hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
            Create
            </button>
        </form>
    </div>
</div>


{% endblock %}

{% extends "base.html" %} 
{% load static %} 

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800">Create New Order</h2>
    <form method="POST" class="space-y-6">
        {% csrf_token %} 
        
        <!-- Category Field -->
        <div>
            <label for="id_category" class="block text-sm font-medium text-gray-700 mb-1">Select Category:</label>
            {{ form.category }}
        </div> 
        
        <!-- Product Field -->
        <div>
            <label for="id_product" class="block text-sm font-medium text-gray-700 mb-1">Select Product:</label>
            {{ form.product }}
        </div> 
        
        <!-- Quantity Field -->
        <div>
            <label for="id_quantity" class="block text-sm font-medium text-gray-700 mb-1">Quantity:</label>
            {{ form.quantity }}
        </div> 

        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Create Order
        </button>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto mt-10 bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Reject Order #{{ order.id }}</h1>

    <form method="POST">
        {% csrf_token %}
        <label class="block mb-2 font-semibold text-gray-700">Reason for rejection</label>
        <textarea name="reason" rows="4" class="w-full border rounded p-2 mb-4" placeholder="Enter rejection reason"></textarea>
        <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Reject Order</button>
    </form>
</div>
{% endblock %}

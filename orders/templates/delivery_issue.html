{% extends 'base.html' %}
{% block content %}
<h2>Delivery Issue - Order #{{ order.id }}</h2>

<form method="POST">
    {% csrf_token %}

    <div>
        <label>What went wrong?</label><br>
        <textarea name="reason" placeholder="Explain the issue clearly..." required></textarea>
    </div>

    <br>

    <button type="submit" style="background:red;color:white;">
        Report Problem
    </button>
</form>
{% endblock content %}

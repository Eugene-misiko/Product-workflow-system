<!DOCTYPE html>
<html>
<head><title>Notifications</title></head>
<body>
<h1>My Notifications</h1>
<table border="1">
<tr>
    <th>Message</th>
    <th>Read</th>
</tr>
{% for n in notifications %}
<tr>
    <td>{{ n.message }}</td>
    <td>{{ n.is_read }}</td>
</tr>
{% empty %}
<tr><td colspan="2">No notifications</td></tr>
{% endfor %}
</table>
</body>
</html>

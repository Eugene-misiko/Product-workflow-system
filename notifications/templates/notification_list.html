{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% block title %}Notifications{% endblock title %}
</head>
<body class="bg-gray-100 p-8">
    {% block content %}
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">My Notifications</h1>
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full table-auto w-full">
        <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">
                    Message
                </th>
                <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">
                    Read
                </th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for n in notifications %}
                <tr class="{% if loop.index is odd %}bg-gray-50{% else %}bg-white{% endif %} hover:bg-gray-100">
                    <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900">
                        {{ n.message }}
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm">
                        {% if n.is_read %}
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                            Yes
                        </span>
                        {% else %}
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">
                            No
                        </span>
                        {% endif %}
                    </td>
                </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="px-4 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                            No notifications
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    {% endblock content %}
</body>
</html>

<a href="/" class="text-3xl font-bold text-blue-600 mb-6">Our Products</a>

<div class="flex flex-wrap gap-6 justify-center">
  {% for product in products %}
  <!-- Product Card -->
  <div class="border border-gray-200 rounded-lg shadow-md p-4 w-64 flex flex-col">
    <h3 class="text-xl font-semibold mb-2">{{ product.name }}</h3>
    <p class="text-gray-600 mb-3 flex-grow">{{ product.description }}</p>
    <p class="font-bold text-lg text-green-700 mb-3">Price: ${{ product.price }}</p>

    {% if product.images.first %}
    <img
      src="{{ product.images.first.image.url }}"
      alt="{{ product.name }}"
      class="w-full h-auto object-cover rounded-lg transition-all duration-500 hover:scale-105 hover:rotate-1 hover:shadow-2xl"
    />
    <a href="api/view/create" class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 mt-5">Order</a>
    {% else %}
    <p class="text-gray-500 italic">No image available</p>
    {% endif %}
  </div>
  {% endfor %}
</div>

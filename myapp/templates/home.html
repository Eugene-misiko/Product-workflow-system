 
{% block title %}{% endblock title %}
<script src="https://cdn.tailwindcss.com"></script>
{% block content %}
<div class="container mx-auto p-4  grid">
  <h2>Categories:</h2>
  <li class="list-none">
    {% for category in categories %}
    <li class="list-none">
     <a href="{% url 'product_list_template' category.slug %}">{{category.name}}</a>
     </li>
    {% endfor %}
  </li>
</div>
{% endblock content %}

{% extends 'base.html' %}
{% block title %}{{product.name}}{% endblock title %}
{% block content %}
<div class="container mx-auto p-4 ">
    <div>
        {% if product.image %}
        <img src="{{product.image.url}}" alt={{product.name}} class="max-h-[80vh]">
        {% else %}
        <p>The image is not available</p>
        {% endif %}
    </div>
    <h3 class="font-semibold">{{product.name}}</h3>
      <p>{{product.description}}</p>
      <p class="text-indigo-600"><span class="text-green-500 font-bold mr-3">Ksh</span>{{product.price}}</p>
    </div>
    <form action="">
        <button class="bg-indigo-600 text-white px-4 py-2 rounded">Add to Cart</button>
    </form>
</div>
{% endblock content %}

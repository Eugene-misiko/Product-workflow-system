{% extends 'base.html' %}
<!DOCTYPE html>
<html>
<head>
    {% block title %}<title>Register</title>{% endblock title %}
</head>
<body>
    {% block content %}
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</body>
</html>
{% endblock content %}

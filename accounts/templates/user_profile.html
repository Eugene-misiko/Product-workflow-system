{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center  justify-center  rounded-2xl px-4">
    <div class="w-[80%] max-w-md bg-white rounded-2xl p-6 ">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
            My Profile
        </h2>
        <span class="flex mt-6 justify-center rounded-[50%]">{{user.image}}</span>
        <ul class="space-y-4 text-gray-700">
            <li class="flex justify-between border-b pb-2">
                <span class="font-medium">Username</span>
                <span>{{ user.username }}</span>
            </li>
            <li class="flex justify-between border-b pb-2">
                <span class="font-medium">Email</span>
                <span>{{ user.email }}</span>
            </li>
            <li class="flex justify-between border-b pb-2">
                <span class="font-medium">Phone</span>
                <span>{{ user.phone }}</span>
            </li>
            <li class="flex justify-between">
                <span class="font-medium">Role</span>
                <span class="capitalize">{{ user.role }}</span>
            </li>
        </ul>

        <div class="mt-6 text-center">
            <a href="{% url 'password_change' %}"
               class="inline-block px-5 py-2 rounded-lg bg-indigo-600 text-white font-medium
                      hover:bg-indigo-700 transition duration-200">
                Change Password
            </a>
        </div>
    </div>
</div>


{% endblock %}

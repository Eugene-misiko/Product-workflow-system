{% extends 'base.html' %}
<!DOCTYPE html>
<html>
<head>
    {% block title %}<title>My Profile</title>{% endblock title %}
</head>
<body>
    {% block content %}
    <h1>My Profile</h1>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Role:</strong> {{ user.role }}</p>
    <p><strong>Phone:</strong> {{ user.phone }}</p>
</body>
</html>
{% endblock content %}

{% extends "base.html" %}

{% block content %}
<h2>My Profile</h2>

<ul>
    <li><strong>Username:</strong> {{ user_obj.username }}</li>
    <li><strong>Email:</strong> {{ user_obj.email }}</li>
    <li><strong>Phone:</strong> {{ user_obj.phone }}</li>
    <li><strong>Role:</strong> {{ user_obj.role }}</li>
</ul>

<a href="{% url 'password_change' %}">Change Password</a>
{% endblock %}

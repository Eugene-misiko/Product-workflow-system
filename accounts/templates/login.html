{% load static %}
{% load widget_tweaks %}

<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

{% include 'navbar.html' %}

<div class="relative h-screen bg-cover bg-center flex items-center justify-center"
     style="background-image: url('{% static "image/background.jpg" %}');">

    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative z-10 w-full max-w-md p-8 rounded-2xl 
                bg-white/20 backdrop-blur-xl 
                border border-white/30 
                shadow-2xl shadow-black/40">

        <h1 class="text-3xl font-bold text-center text-white mb-8">
            Welcome Back
        </h1>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
                <div class="space-y-2">

                    <label class="block text-sm font-medium text-white">
                        {{ field.label }}
                    </label>

                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-sm">
                            {{ field.errors|striptags }}
                        </p>
                    {% endif %}

                </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-400 to-indigo-500 
                       hover:from-blue-500 hover:to-indigo-600
                       text-white font-semibold py-3 rounded-xl
                       transition duration-300
                       shadow-lg hover:shadow-xl">
                Login
            </button>
        </form>
    </div>
</div>

</body>
</html>

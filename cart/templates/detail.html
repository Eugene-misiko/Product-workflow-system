{% extends 'base.html' %}
{% block title %}My Cart{% endblock title %}
{% block content %}
<h2>My cart</h2>
{% if cart %}
 <ul>
    {% for item in cart.items.all %}
    <li>{% if item.product.image %}
        <img src="{{item.product.url}}" alt={{item.product.name}}>
        {% endif %}
        {{item.product.name}}
    </li>

    {% endfor %}
 </ul>
{% endif %}
{% endblock content %}

{% extends "base.html" %}
{% block content %}

<h2>Audit Logs</h2>

<table border="1">
<tr>
    <th>User</th>
    <th>Action</th>
    <th>Details</th>
    <th>Date</th>
</tr>
{% for log in logs %}
<tr>
    <td>{{ log.user }}</td>
    <td>{{ log.action }}</td>
    <td>{{ log.details }}</td>
    <td>{{ log.created_at }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}

{% extends 'base.html' %}
<!DOCTYPE html>
<html>
<head>
    {% block title %}Documents{% endblock title %}
</head>
<body>
    {% block content %}
<h1>Legal Documents</h1>
<table border="1">
<tr>
    <th>ID</th>
    <th>Order</th>
    <th>File</th>
</tr>
{% for doc in documents %}
<tr>
    <td>{{ doc.id }}</td>
    <td>{{ doc.order.id }}</td>
    <td>{{ doc.file }}</td>
</tr>
{% empty %}
<tr><td colspan="3">No documents</td></tr>
{% endfor %}
</table>
</body>
</html>
{% endblock content %}

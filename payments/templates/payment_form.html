{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800">Make Payment</h2>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Payment Method -->
        <div>
            <label for="id_method_of_payment" class="block text-sm font-medium text-gray-700 mb-1">Payment Method:</label>
            {{ form.method_of_payment }}
        </div>

        <!-- Amount -->
        <div>
            <label for="id_amount" class="block text-sm font-medium text-gray-700 mb-1">Amount:</label>
            {{ form.amount }}
        </div>

        <!-- Phone Number for STK Push -->
        <div>
            <label for="id_phone_number" class="block text-sm font-medium text-gray-700 mb-1">Phone Number:</label>
            {{ form.phone_number }}
        </div>

        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Pay Now
        </button>
    </form>
</div>
{% endblock %}

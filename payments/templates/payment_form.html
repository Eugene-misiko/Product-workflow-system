{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800">Make Payment</h2>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <!-- Payment Method -->
        <div>
            <label for="{{ form.method_of_payment.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Payment Method
            </label>
            {{ form.method_of_payment }}
        </div>

        <!-- Amount -->
        <div>
            <label for="{{ form.amount.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Amount
            </label>
            {{ form.amount }}
        </div>

        <!-- Phone Number -->
        <div>
            <label for="{{ form.phone_number.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Phone Number
            </label>
            {{ form.phone_number }}
        </div>

        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
            Pay Now
        </button>
    </form>
</div>
{% endblock %}

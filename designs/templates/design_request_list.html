{% extends 'base.html' %}
<!DOCTYPE html>
<html>
<head>
    {% block title %}<title>Design Requests</title>{% endblock title %}
</head>
<body>
<h1>Design Requests</h1>
<table border="1">
<tr>
    <th>ID</th>
    <th>Order</th>
    <th>Designer</th>
</tr>
{% for r in requests %}
<tr>
    <td>{{ r.id }}</td>
    <td>{{ r.order.id }}</td>
    <td>{{ r.designer }}</td>
</tr>
{% empty %}
<tr><td colspan="3">No requests</td></tr>
{% endfor %}
</table>
</body>
</html>

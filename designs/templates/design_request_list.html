<!DOCTYPE html>
<html>
<head><title>Design Requests</title></head>
<body>
<h1>Design Requests</h1>
<table border="1">
<tr>
    <th>ID</th>
    <th>Order</th>
    <th>Designer</th>
</tr>
{% for r in requests %}
<tr>
    <td>{{ r.id }}</td>
    <td>{{ r.order.id }}</td>
    <td>{{ r.designer }}</td>
</tr>
{% empty %}
<tr><td colspan="3">No requests</td></tr>
{% endfor %}
</table>
</body>
</html>

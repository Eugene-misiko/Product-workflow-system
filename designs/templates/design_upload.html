{% extends "base.html" %}
{% load static %}

{% block content %}
<h2>Upload Your Design</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group">
        <label for="id_file">Design File:</label>
        {{ form.as_p }}
    </div>

    <button type="submit" class="btn btn-primary">Upload Design</button>
</form>
{% endblock %}
